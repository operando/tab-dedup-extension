<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>Tab Dedup</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        width: 320px;
        margin: 0;
        padding: 16px;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 12px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .header h1 {
        margin: 0;
      }
      a.history-link {
        font-size: 11px;
        color: #1a73e8;
        text-decoration: none;
        cursor: pointer;
      }
      a.history-link:hover {
        text-decoration: underline;
      }
      .row {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
      }
      button {
        flex: 1;
        padding: 8px 12px;
        font-size: 13px;
        border: 1px solid #888;
        background: #f7f7f7;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background: #eaeaea;
      }
      button.primary {
        background: #1a73e8;
        color: #fff;
        border-color: #1a73e8;
      }
      button.primary:hover {
        background: #1761c5;
      }
      label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        margin-bottom: 8px;
      }
      #status {
        font-size: 12px;
        color: #555;
        margin-top: 8px;
        min-height: 16px;
      }
      ul#preview {
        list-style: none;
        padding: 0;
        margin: 8px 0 0;
        max-height: 240px;
        overflow-y: auto;
        font-size: 12px;
      }
      ul#preview li {
        padding: 4px 6px;
        border-bottom: 1px solid #eee;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      ul#preview li .count {
        display: inline-block;
        min-width: 22px;
        color: #1a73e8;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>重複タブを閉じる</h1>
      <a id="openHistory" class="history-link" href="#">履歴を見る</a>
    </div>
    <label>
      <input type="checkbox" id="ignoreHash" />
      URLのハッシュ(#...)を無視する
    </label>
    <label>
      <input type="checkbox" id="ignoreQuery" />
      URLのクエリ(?...)も無視する
    </label>
    <label>
      <input type="checkbox" id="currentWindowOnly" />
      現在のウィンドウのみ対象
    </label>
    <div class="row">
      <button id="scan">スキャン</button>
      <button id="dedup" class="primary">重複を閉じる</button>
    </div>
    <div id="status"></div>
    <ul id="preview"></ul>
    <script src="popup.js"></script>
  </body>
</html>
